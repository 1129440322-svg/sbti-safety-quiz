<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>安全人SBTI人格测试 · 20题版</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
    background: #e8f5ee;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 20px 0 60px;
  }

  .quiz-app {
    width: 100%;
    max-width: 680px;
    background: #fff;
    border-radius: 24px;
    overflow: hidden;
    box-shadow: 0 8px 40px rgba(45,106,79,0.12);
  }

  /* ===== HERO ===== */
  .hero {
    background: linear-gradient(145deg, #152f20, #1e4d35 50%, #2a6a4e);
    padding: 48px 32px 44px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    top: -70px; right: -70px;
    width: 240px; height: 240px;
    border-radius: 50%;
    background: rgba(255,255,255,0.04);
  }
  .hero::after {
    content: '';
    position: absolute;
    bottom: -90px; left: -50px;
    width: 300px; height: 300px;
    border-radius: 50%;
    background: rgba(255,255,255,0.03);
  }
  .hero-icon { font-size: 40px; margin-bottom: 14px; }
  .hero h1 {
    color: #fff;
    font-size: 34px;
    font-weight: 900;
    letter-spacing: 3px;
    margin-bottom: 12px;
    line-height: 1.3;
  }
  .hero h1 em { font-style: normal; color: #95d5b2; }
  .hero p {
    color: rgba(255,255,255,0.62);
    font-size: 14px;
    line-height: 1.8;
    max-width: 400px;
    margin: 0 auto;
  }
  .hero-badge {
    display: inline-flex; align-items: center; gap: 7px;
    background: rgba(82,183,136,0.18);
    border: 1px solid rgba(82,183,136,0.3);
    color: #95d5b2;
    font-size: 12px;
    padding: 5px 16px;
    border-radius: 20px;
    margin-top: 18px;
    font-weight: 600;
    letter-spacing: 1px;
  }

  /* ===== START SCREEN ===== */
  .start-screen {
    padding: 36px 28px;
    text-align: center;
    background: #fff;
  }
  .start-rules {
    background: #f0faf4;
    border: 1.5px solid #c7e8d4;
    border-radius: 16px;
    padding: 20px 24px;
    margin-bottom: 24px;
    text-align: left;
  }
  .start-rules-title {
    font-size: 13px;
    font-weight: 700;
    color: #2d6a4f;
    margin-bottom: 12px;
    letter-spacing: 1px;
  }
  .start-rules ul {
    list-style: none;
    font-size: 14px;
    color: #555;
    line-height: 2;
  }
  .start-rules ul li::before {
    content: '✓ ';
    color: #52b788;
    font-weight: 700;
  }
  .start-btn {
    display: block;
    width: 100%;
    background: linear-gradient(135deg, #2d6a4f, #52b788);
    color: #fff;
    font-size: 17px;
    font-weight: 700;
    padding: 16px;
    border-radius: 30px;
    border: none;
    cursor: pointer;
    letter-spacing: 2px;
    font-family: inherit;
    box-shadow: 0 4px 16px rgba(45,106,79,0.3);
    transition: all 0.2s;
  }
  .start-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(45,106,79,0.4); }

  /* ===== PROGRESS ===== */
  .progress-wrap {
    padding: 16px 24px 0;
    background: #fff;
  }
  .progress-info {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 8px;
  }
  .progress-label { font-size: 13px; color: #888; font-weight: 500; }
  .progress-label strong { color: #2d6a4f; font-size: 16px; }
  .progress-bar-bg {
    width: 100%; height: 8px; background: #e8f5ee;
    border-radius: 10px; overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #2d6a4f, #52b788);
    border-radius: 10px;
    transition: width 0.35s ease;
    width: 0%;
  }

  /* ===== QUESTION ===== */
  .question-area {
    padding: 24px 24px 16px;
    background: #fff;
  }
  .q-card {
    display: none;
    animation: slideIn 0.3s ease;
  }
  .q-card.active { display: block; }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(14px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .q-number {
    font-size: 12px; color: #52b788; font-weight: 700;
    letter-spacing: 2px; margin-bottom: 10px;
  }
  .q-text {
    font-size: 17px; font-weight: 700; color: #1a3a2a;
    line-height: 1.65; margin-bottom: 18px; letter-spacing: 0.3px;
  }

  /* ===== OPTIONS ===== */
  .options { display: flex; flex-direction: column; gap: 9px; }
  .opt {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 13px 15px;
    background: #f7fcf9;
    border: 1.5px solid #e0f0e6;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.18s;
    text-align: left;
    width: 100%;
    font-size: 14px; color: #444;
    line-height: 1.55;
    font-family: inherit;
  }
  .opt:hover { border-color: #52b788; background: #edf8f1; color: #1a3a2a; }
  .opt.picked {
    border-color: #2d6a4f; background: #e0f0e6; color: #1a3a2a;
    box-shadow: 0 2px 8px rgba(45,106,79,0.1);
  }
  .opt-dot {
    width: 26px; height: 26px; border-radius: 50%;
    background: #d8f3dc; color: #2d6a4f;
    font-size: 12px; font-weight: 800;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all 0.18s;
  }
  .opt.picked .opt-dot { background: #2d6a4f; color: #fff; }
  .opt-text { flex: 1; padding-top: 3px; }

  /* ===== NAV ===== */
  .nav-wrap {
    padding: 12px 24px 24px;
    display: flex; gap: 10px;
    background: #fff;
  }
  .btn {
    padding: 13px 20px; border-radius: 28px;
    font-size: 14px; font-weight: 700;
    cursor: pointer; border: none;
    transition: all 0.2s; font-family: inherit;
    letter-spacing: 1px;
  }
  .btn-prev { background: #f0f0f0; color: #999; }
  .btn-prev:hover:not(:disabled) { background: #e0e0e0; color: #555; }
  .btn-prev:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-next {
    background: #2d6a4f; color: #fff; flex: 1;
  }
  .btn-next:hover:not(:disabled) { background: #1e4d35; }
  .btn-next:disabled { background: #ccc; cursor: not-allowed; }
  .btn-done {
    background: linear-gradient(135deg, #2d6a4f, #52b788);
    color: #fff; flex: 1; display: none;
  }
  .btn-done:hover { filter: brightness(1.1); }

  /* ===== RESULT OVERLAY ===== */
  .result-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 999;
    justify-content: center;
    align-items: center;
    overflow-y: auto;
    padding: 20px;
  }
  .result-overlay.show { display: flex; }

  .result-sheet {
    width: 100%; max-width: 680px;
    max-height: 92vh;
    overflow-y: auto;
    background: #fff;
    border-radius: 24px;
    padding: 36px 24px 48px;
    animation: sheetUp 0.4s ease;
  }
  @keyframes sheetUp {
    from { opacity: 0; transform: scale(0.9) translateY(20px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  .result-badge {
    text-align: center;
    font-size: 11px;
    color: #52b788;
    font-weight: 700;
    letter-spacing: 3px;
    margin-bottom: 14px;
    text-transform: uppercase;
  }
  .result-char-img {
    width: 160px;
    height: 160px;
    object-fit: cover;
    border-radius: 20px;
    display: block;
    margin: 0 auto 16px;
    box-shadow: 0 8px 32px rgba(45,106,79,0.2);
    border: 3px solid #d8f3dc;
  }
  .result-type-name {
    text-align: center;
    font-size: 42px;
    font-weight: 900;
    color: #1a3a2a;
    letter-spacing: 6px;
    margin-bottom: 4px;
  }
  .result-type-tag {
    text-align: center;
    font-size: 14px;
    color: #52b788;
    font-weight: 700;
    letter-spacing: 3px;
    margin-bottom: 20px;
  }
  .result-emoji {
    text-align: center;
    font-size: 72px;
    margin-bottom: 16px;
    line-height: 1;
  }
  .result-desc {
    background: linear-gradient(145deg, #152f20, #1e4d35);
    border-radius: 18px;
    padding: 24px 22px;
    margin-bottom: 24px;
    color: rgba(255,255,255,0.85);
    font-size: 14px;
    line-height: 1.9;
    text-align: left;
  }
  .result-desc strong { color: #95d5b2; }

  /* Chart */
  .result-chart {
    background: #f7fffe;
    border: 1.5px solid #d8f3dc;
    border-radius: 16px;
    padding: 18px 20px;
    margin-bottom: 20px;
  }
  .chart-title {
    font-size: 12px;
    color: #888;
    font-weight: 700;
    letter-spacing: 2px;
    margin-bottom: 14px;
    text-align: center;
  }
  .chart-row {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 9px;
  }
  .chart-label {
    font-size: 12px; font-weight: 700;
    color: #2d6a4f; width: 54px; text-align: right; flex-shrink: 0;
  }
  .chart-track {
    flex: 1; height: 12px;
    background: #e8f5ee; border-radius: 8px; overflow: hidden;
  }
  .chart-fill {
    height: 100%; background: linear-gradient(90deg, #2d6a4f, #52b788);
    border-radius: 8px; width: 0%; transition: width 1.2s ease;
  }
  .chart-score { font-size: 11px; color: #999; font-weight: 700; width: 26px; }

  /* Second type */
  .second-type {
    background: #f0faf4;
    border: 1.5px dashed #52b788;
    border-radius: 14px;
    padding: 16px 20px;
    margin-bottom: 20px;
    text-align: left;
  }
  .second-label {
    font-size: 11px; color: #52b788;
    font-weight: 700; letter-spacing: 2px;
    margin-bottom: 6px;
  }
  .second-name { font-size: 18px; font-weight: 800; color: #1a3a2a; margin-bottom: 4px; }
  .second-desc { font-size: 13px; color: #777; line-height: 1.7; }

  /* Actions */
  .result-actions { display: flex; flex-direction: column; gap: 10px; }
  .btn-copy {
    padding: 14px; border-radius: 28px;
    background: linear-gradient(135deg, #2d6a4f, #52b788);
    color: #fff; font-size: 15px; font-weight: 700;
    border: none; cursor: pointer; font-family: inherit;
    letter-spacing: 1px;
  }
  .btn-retest {
    padding: 12px; border-radius: 28px;
    background: #fff; color: #888;
    border: 1.5px solid #ddd;
    font-size: 14px; font-weight: 600;
    cursor: pointer; font-family: inherit;
    letter-spacing: 1px;
  }
  .share-hint {
    text-align: center;
    font-size: 12px; color: #bbb;
    margin-bottom: 8px;
  }
</style>
</head>
<body>

<div class="quiz-app">

  <!-- HERO -->
  <div class="hero">
    <div class="hero-icon">⛑️</div>
    <h1>你是哪种<br><em>安全人</em>？</h1>
    <p>安全生产专属SBTI人格测试 · 20题版<br>测完自动出结果，还有性格分析报告</p>
    <div class="hero-badge">🔥 安全圈爆款测试</div>
  </div>

  <!-- START -->
  <div class="start-screen" id="startScreen">
    <div class="start-rules">
      <div class="start-rules-title">📋 测试说明</div>
      <ul>
        <li>共 20 道选择题，每题 4 个选项</li>
        <li>根据你的第一直觉选择，答案无对错</li>
        <li>做完立即显示你的专属人格类型</li>
        <li>结果仅供娱乐参考 😄</li>
      </ul>
    </div>
    <button class="start-btn" onclick="beginQuiz()">🚀 开始测试</button>
  </div>

  <!-- QUIZ -->
  <div id="quizZone" style="display:none;">
    <div class="progress-wrap">
      <div class="progress-info">
        <span class="progress-label">第 <strong id="curQNum">1</strong> / 20 题</span>
        <span class="progress-label" id="pctLabel">0%</span>
      </div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progressFill"></div>
      </div>
    </div>

    <div class="question-area" id="qArea"></div>

    <div class="nav-wrap">
      <button class="btn btn-prev" id="btnPrev" onclick="prevQ()" disabled>← 上一题</button>
      <button class="btn btn-next" id="btnNext" onclick="nextQ()" disabled>下一题 →</button>
      <button class="btn btn-done" id="btnDone" onclick="showResult()">🎯 查看我的结果</button>
    </div>
  </div>

</div>

<!-- RESULT OVERLAY -->
<div class="result-overlay" id="resultOverlay">
  <div class="result-sheet" id="resultSheet">
    <div class="result-badge">—— 你的安全人格类型 ——</div>
    <img class="result-char-img" id="resImg" src="" alt="人格画像">
    <div class="result-type-name" id="resName">加载中…</div>
    <div class="result-type-tag" id="resTag"></div>
    <div class="result-desc" id="resDesc"></div>

    <div class="result-chart">
      <div class="chart-title">📊 你的性格分布</div>
      <div id="chartContainer"></div>
    </div>

    <div class="second-type" id="secondBox">
      <div class="second-label">🧭 你还可能是</div>
      <div class="second-name" id="secName"></div>
      <div class="second-desc" id="secDesc"></div>
    </div>

    <div class="result-actions">
      <div class="share-hint">转发给你的安全搭档，看看他们是什么类型 👇</div>
      <button class="btn-copy" id="btnCopy" onclick="copyResult()">📋 复制结果到剪贴板</button>
      <button class="btn-retest" onclick="retake()">🔄 重新测试一次</button>
    </div>
  </div>
</div>

<script>
// ===================== 数据 =====================
// 类型 → 图片编号（与 chars 文件夹中 1.png~12.png 一一对应）
const TYPE_IMG = {
  ZDZ:'1', JCZ:'2', SGZ:'3', LDZ:'4', TPZ:'5',
  LHZ:'6', KXZ:'7', HSL:'8', BGZ:'9', BGL:'10',

};

const T = {
  ZDZ: { name:'制度者', tag:'ZDZ · 王者',

  SGZ: { name:'甩锅者', tag:'SGZ · 艺术家',
    desc:'你是传说中的「甩锅艺术家」！出事的那一瞬间，你已经在规划下一步了——配合调查全程积极，签名环节永远缺席。你的反应速度堪比特种兵，只可惜方向用偏了。建议：有时候，勇敢站出来，反而能获得意想不到的信任和认可。' },
  LDZ: { name:'唠叨者', tag:'LDZ · 守护神',
    desc:'你是真正的「唠叨守护神」！安全帽安全帽说了八百遍，耳朵起茧了你都不知道。你的嘴巴和你的责任心一样停不下来。别人嫌你烦，但你比谁都清楚：每一句唠叨背后，都是对生命实实在在的敬畏。请继续唠叨，世界真的需要你！' },

    desc:'你是看透一切的「躺平哲学家」！风轻云淡、与世无争，事故发生了也不慌不忙，"反正不是我的事嘛"。你的人生哲学是：尽人事，听天命。但安全这个行当，有时候真的不能太佛系……建议偶尔站起来一下，万一真出事了，躺平可保护不了任何人。' },
  LHZ: { name:'留痕者', tag:'LHZ · 摄影师',

  KXZ: { name:'恐吓者', tag:'KXZ · 演说家',
    desc:'你是独树一帜的「恐惧教育家」！事故案例信手拈来，培训视频血腥指数拉满。你坚信：只有把最坏的结果呈现出来，才能真正触动人心。虽然有人说你"贩卖焦虑"，但你的学员看到警示牌时，真的会下意识去检查安全帽有没有戴好——这就是效果！' },
  HSL: { name:'和事佬', tag:'HSL · 外交家',
    desc:'你是八面玲珑的「安全外交家」！生产说有道理，安全也没错，你的职责就是让所有人满意。你擅长在各方之间斡旋，化解矛盾于无形。虽然有时候两边都讨好，结果是谁也不真的重视，但职场peace & love确实需要你这样的人！' },
  BGZ: { name:'表格者', tag:'BGZ · 数据控',

  BGL: { name:'背锅侠', tag:'BGL · 英雄',

  XXZ: { name:'学习者', tag:'XXZ · 进化者',

  ZAQ: { name:'真安全', tag:'ZAQ · 传说',

// 20道逻辑清晰的题目
const QUESTIONS = [
  {
    q:'清晨到工地，你通常先做什么？',
    opts:[
      { text:'检查所有人防护装备穿戴是否规范' },
      { text:'把今日安全注意事项写在看板上' },

  {

      { text:'掏出手机拍下证据，备注好时间地点人物' },

      { text:'给他讲一个某某工地出事的真实案例' }

  },
  {
    q:'领导想把安全检查频率降低，你的反应是？',
    opts:[
      { text:'翻出法规条文据理力争，一条条念给领导听' },
      { text:'嘴上答应，背地里还是照常检查不放松' },

const TYPE_MAP = [
  ['JCZ','ZDZ','LHZ','TPZ'],    // Q1
  ['ZDZ','LHZ','TPZ','KXZ'],    // Q2
  ['ZDZ','JCZ','SGZ','HSL'],    // Q3
  ['ZDZ','KXZ','BGZ','TPZ'],    // Q4
  ['LHZ','JCZ','HSL','TPZ'],    // Q5
  ['JCZ','TPZ','HSL','ZDZ'],    // Q6
  ['BGZ','XXZ','KXZ','LHZ'],    // Q7
  ['LHZ','KXZ','TPZ','HSL'],    // Q8
  ['LHZ','LDZ','TPZ','SGZ'],    // Q9
  ['BGL','JCZ','ZDZ','HSL'],    // Q10
  ['BGZ','LHZ','JCZ','TPZ'],    // Q11
  ['ZDZ','JCZ','KXZ','TPZ'],    // Q12
  ['ZDZ','LHZ','XXZ','TPZ'],    // Q13
  ['BGZ','HSL','JCZ','TPZ'],    // Q14
  ['LHZ','KXZ','BGL','LDZ'],    // Q15

  ['ZDZ','BGZ','XXZ','TPZ'],    // Q17

  ['LDZ','XXZ','LHZ','TPZ'],    // Q20
];

// ===================== 状态 =====================
let curQ = 0;
let answers = []; // answers[Qindex] = optionIndex(0-3)
const letters = ['A','B','C','D'];

// ===================== 初始化 =====================
function buildQuiz() {
  const area = document.getElementById('qArea');
  QUESTIONS.forEach((q, idx) => {
    const card = document.createElement('div');
    card.className = 'q-card' + (idx === 0 ? ' active' : '');
    card.id = `qCard${idx}`;
    card.innerHTML = `
      <div class="q-number">第 ${idx+1} 题</div>
      <div class="q-text">${q.q}</div>
      <div class="options">
        ${q.opts.map((opt, oi) => `
          <button class="opt" id="opt${idx}_${oi}" onclick="pick(${idx},${oi})">
            <span class="opt-dot">${letters[oi]}</span>
            <span class="opt-text">${opt.text}</span>
          </button>
        `).join('')}
      </div>
    `;
    area.appendChild(card);
  });
}

function beginQuiz() {
  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('quizZone').style.display = 'block';
  answers = new Array(20).fill(-1);
  buildQuiz();
  refreshUI();
}

function pick(qIdx, oIdx) {
  answers[qIdx] = oIdx;
  // update UI
  document.querySelectorAll(`#qCard${qIdx} .opt`).forEach(b => b.classList.remove('picked'));
  document.getElementById(`opt${qIdx}_${oIdx}`).classList.add('picked');
  refreshUI();

  // 答完第20题自动弹出结果
  if (qIdx === 19) {
    setTimeout(() => {
      const unanswered = answers.filter(a => a === -1).length;
      if (unanswered === 0) showResult();
    }, 350);
  }
}

function refreshUI() {
  const answered = answers.filter(a => a !== -1).length;
  const pct = Math.round((answered / 20) * 100);
  document.getElementById('curQNum').textContent = curQ + 1;
  document.getElementById('pctLabel').textContent = pct + '%';
  document.getElementById('progressFill').style.width = pct + '%';

  // show correct card
  document.querySelectorAll('.q-card').forEach(c => c.classList.remove('active'));
  document.getElementById(`qCard${curQ}`).classList.add('active');

  // buttons
  document.getElementById('btnPrev').disabled = (curQ === 0);
  const hasAnswer = answers[curQ] !== -1;
  const isLast = curQ === 19;
  document.getElementById('btnNext').style.display = isLast ? 'none' : '';
  document.getElementById('btnDone').style.display = isLast ? '' : 'none';
  document.getElementById('btnNext').disabled = !hasAnswer || isLast;
  document.getElementById('btnDone').disabled = !hasAnswer;
}

function nextQ() {
  if (curQ < 19 && answers[curQ] !== -1) {
    curQ++;
    refreshUI();
  }
}

function prevQ() {
  if (curQ > 0) {
    curQ--;
    refreshUI();
  }
}

function showResult() {
  console.log('showResult called, answers:', answers);
  const unanswered = answers.filter(a => a === -1).length;
  console.log('unanswered:', unanswered);
  if (unanswered > 0) { alert('还有' + unanswered + '题没答完！'); return; }

  // count scores
  const score = {};
  answers.forEach((ans, qIdx) => {
    if (ans === -1) return;
    const type = TYPE_MAP[qIdx][ans];
    score[type] = (score[type] || 0) + 1;
  });

  const sorted = Object.entries(score).sort((a,b) => b[1]-a[1]);
  const top = sorted[0];
  // 防止只有1种类型时 sorted[1] 为 undefined
  const sec = sorted.length > 1 ? sorted[1] : sorted[0];

  const t1 = T[top[0]];
  const t2 = T[sec[0]];

  // 设置人物图片
  const imgNum = TYPE_IMG[top[0]] || '1';
  document.getElementById('resImg').src = `./chars/${imgNum}.png`;

  document.getElementById('resName').textContent = t1.name;
  document.getElementById('resTag').textContent = t1.tag;
  document.getElementById('resDesc').innerHTML = t1.desc;

  // 次类型名称（从emoji映射回去）
  const emojiMap = { '📋':'制度者','🔍':'检查者','🏃':'甩锅者','😤':'唠叨者',
    '😴':'躺平者','📸':'留痕者','🚨':'恐吓者','🤝':'和事佬','📊':'表格者',
    '🧨':'背锅侠','🎓':'学习者','🦺':'真安全' };
  document.getElementById('secName').textContent = `${t2.name}`;
  document.getElementById('secDesc').textContent =
    `你与「${t2.name}」特征有约${Math.round(sec[1]/20*100)}%的契合度，属于复合型安全人格。`;

  // chart
  const top6 = sorted.slice(0, 6);
  const maxS = top6.length > 0 ? top6[0][1] : 1;
  const chartHtml = top6.map(([type, cnt]) => {
    const t = T[type];
    const pct = Math.round(cnt/20*100);
    const barW = Math.round(cnt/maxS*100);
    return `
      <div class="chart-row">
        <div class="chart-label">${t.name}</div>
        <div class="chart-track"><div class="chart-fill" data-w="${barW}"></div></div>
        <div class="chart-score">${cnt}/20</div>
      </div>
    `;
  }).join('');
  document.getElementById('chartContainer').innerHTML = chartHtml;

  document.getElementById('resultOverlay').classList.add('show');

  setTimeout(() => {
    document.querySelectorAll('.chart-fill').forEach(b => {
      b.style.width = b.dataset.w + '%';
    });
  }, 200);
}

function copyResult() {
  const name = document.getElementById('resName').textContent;
  const tag = document.getElementById('resTag').textContent;
  const imgNum = document.getElementById('resImg').src.split('/').pop().replace('.png','');

  const text = `✅ 我的安全人格类型：${name}（${tag}）

我是哪种安全人？来做SBTI测试！
#安全人 #SBTI #EHS #安全生产`;

  navigator.clipboard && navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('btnCopy');
    btn.textContent = '✅ 已复制！快去分享给朋友';
    setTimeout(() => btn.textContent = '📋 复制结果到剪贴板', 2500);
  });
}

function retake() {
  answers = new Array(20).fill(-1);
  curQ = 0;
  document.getElementById('resultOverlay').classList.remove('show');
  document.querySelectorAll('.opt').forEach(b => b.classList.remove('picked'));
  // rebuild
  document.getElementById('qArea').innerHTML = '';
  buildQuiz();
  refreshUI();
}

// click outside sheet to close
document.addEventListener('click', function(e) {
  const overlay = document.getElementById('resultOverlay');
  const sheet = document.getElementById('resultSheet');
  if (overlay.classList.contains('show') && !sheet.contains(e.target)) {
    // don't close on outside click, let user use buttons
  }
});
</script>
